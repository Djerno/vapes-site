# ================================================================
# ONG VAPES — Configuration Netlify
# ================================================================

[build]
  publish = "."

# ----------------------------------------------------------------
# Redirections (complémentaires aux meta refresh des pages)
# ----------------------------------------------------------------
[[redirects]]
  from = "/actions.html"
  to = "/impact.html"
  status = 301
  force = true

[[redirects]]
  from = "/domaines.html"
  to = "/programmes.html"
  status = 301
  force = true

# SPA-style fallback : toute route inconnue redirige vers 404 (géré par index)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# ----------------------------------------------------------------
# Headers de sécurité (redondants avec _headers mais explicites ici)
# ----------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io mailto:; object-src 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-site"

# Cache assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ----------------------------------------------------------------
# Protection contre les bots malveillants & scanners
# ----------------------------------------------------------------
[[edge_functions]]
  function = "bot-shield"
  path = "/*"
